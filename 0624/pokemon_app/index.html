<!doctype html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ポケモンを検索してみよう！</title>
</head>

<body>
    <main class="app">
        <h1>ポケモンを検索してみよう！</h1>

        <form id="searchForm" class="search">
            <input id="keyword" type="text" placeholder="例：ピカチュウ / pikachu / 25" required />
            <button type="submit">検索</button>
        </form>

        <nav class="pager" aria-label="ポケモンの前後移動">
            <button id="prevBtn" type="button" disabled>前へ</button>
            <button id="nextBtn" type="button" disabled>次へ</button>
        </nav>

        <div class="loader" hidden>
            <div class="spinner" aria-label="読み込み中"></div>
        </div>

        <p class="error" hidden></p>
        <article class="card" hidden></article>
    </main>

    <script type="module" src="/src/main.js"></script>
</body>

</html>
